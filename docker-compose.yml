# Runs the Gemini-powered web dashboard. The MCP tool-server is launched
# in-process over stdio (see run.py / MCP_TRANSPORT), so a single container is
# self-contained — no separate MCP service is required.
#
# Requires a .env file with GOOGLE_API_KEY (for Gemini) and, ideally,
# NVD_API_KEY. See .env.example.
services:
  app:
    build: .
    container_name: vendor-risk-assessor
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Pin the in-container port to the published one. .env sets PORT=8000 for
      # local `python run.py`, but inside the container we standardise on 8080
      # (matches EXPOSE, the health-check, and Cloud Run's default).
      - PORT=8080
      # Spawn the MCP tool-server in-process rather than as a second service.
      - MCP_TRANSPORT=stdio
    restart: unless-stopped
