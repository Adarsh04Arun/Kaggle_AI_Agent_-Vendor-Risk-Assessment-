services:
  app:
    build: .
    container_name: vendor-risk-assessor
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - .:/app          # live-reload during development
    depends_on:
      mcp-server:
        condition: service_started
    restart: unless-stopped

  mcp-server:
    build: .
    container_name: vendor-risk-mcp
    command: python -m mcp_server.server --transport sse --port 8081
    ports:
      - "8081:8081"
    env_file:
      - .env
    restart: unless-stopped
